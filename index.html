let userName = '';

let currentDirectory = {
    name: 'root',

};

const rootDirectory = {
    name: 'root',
    contents: ['index.html', 'lol.txt']
};

// Generate a new directory with random numbers and add it to the root directory
const randomDirName = 'dir_' + Math.random().toString(36).substring(7);
rootDirectory.contents.push({name: randomDirName, contents: [{name: 'secret', contents: []}]});

var term = $('body').terminal({
    name: function() {
        if (isNameSet) {
            term.echo('$NAME = \'' + userName + '\'');
        } else {
            term.echo('Please enter your name first.');
        }
    },
    help: function() {
        term.echo('name                 Shows your username.\nls                    Show the files on your current directory.\ncat                    Shows the file contents.\nmkdir                 Create a new directory.\ncd                     Change the current directory.');
    },
    ls: function() {
        const contents = currentDirectory.contents.map(function(item) {
            return item.hasOwnProperty('name') ? '[[b;blue;]' + item.name + ']' : '[[b;green;]' + item + ']';
        }).join('     ');
        term.echo(contents);
    },
    cat: function(filename) {
        const file = currentDirectory.contents.find(function(item) {
            return item.hasOwnProperty('name') ? item.name === filename : item === filename;
        });
        if (file) {
            if (file === 'index.html') {
                term.echo('dir_ <html><body>ill add source code later</body></html>');
            } else if (file === 'lol.txt') {
                term.echo('dir_ deez nuts');
            } else if (file.name === 'secret') {
                window.open('https://www.youtube.com/watch?v=p7YXXieghto', '_blank');
            }
        } else {
            term.error('jsh: File not found: ' + filename);
        }
    },
    rose: function() {
        term.echo(window.roseAscii)
    },
    mkdir: function(dirName) {
        currentDirectory.contents.push({name: dirName, contents: []});
        term.echo('Directory \'' + dirName + '\' created.');
    },
cd: function(dirName) {
    if (dirName === undefined || dirName === null) {
        term.echo('[[;red;]WARNING: All files will be deleted in the current directory (does not apply if in root directory). Type "yes" to confirm.]: ');
        term.read('', function(confirmation) {
            if (confirmation.toLowerCase() === 'yes') {
                currentDirectory = rootDirectory;
                document.title = "/" // Update the document title when changing to the root directory
                term.echo('jsh: Changed to root directory.');
            } else {
                term.echo('Aborted.');
            }
        });
    } else {
        let newDir = currentDirectory.contents.find(function(item) {
            return item.hasOwnProperty('name') ? item.name === dirName : item === dirName;
        });
        if (newDir) {
            currentDirectory = newDir;
            document.title = "/" + dirName; // Update the document title when changing directories
            term.echo('jsh: Changed to directory: ' + dirName);
        } else {
            document.title = "Error: Directory not found"; // Update the document title when a directory is not found
            term.error('jsh: Directory not found: ' + dirName);
        }
    }
}
